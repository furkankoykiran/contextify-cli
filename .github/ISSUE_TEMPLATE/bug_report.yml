name: Bug report
description: Something in the CLI isn't working
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Backend issues (ingest 5xx, auth, dashboard) belong in the closed-source repo — we'll route them. Anything below is CLI-side.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `contextify install`
        2. ...
        3. Expected X, got Y
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: CLI version
      description: 'Output of `contextify --version`'
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: 'Output of `node --version`'
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: 'macOS 14.5 / Ubuntu 22.04 / Windows 11'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Redact API keys and any sensitive paths.
      render: shell
